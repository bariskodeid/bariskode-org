version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: bariskode-pocketbase
    restart: unless-stopped
    ports:
      - "${PB_PORT:-8090}:8090"
    volumes:
      - pb_data:/pb/pb_data
      - ./apps/pocketbase/pb_migrations:/pb/pb_migrations
      - ./apps/pocketbase/pb_hooks:/pb/pb_hooks
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.web
    container_name: bariskode-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4321}:4321"
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - PUBLIC_POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pb_data:
